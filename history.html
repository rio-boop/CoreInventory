<!DOCTYPE html>
<html>

<head>

<title>Inventory History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
}

.table-card{
background:white;
color:black;
border-radius:10px;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<span class="navbar-brand">CoreInventory</span>

<a href="/dashboard" class="btn btn-warning">Dashboard</a>

</div>

</nav>

<div class="container mt-5">

<div class="row">

<div class="col-md-6">

<div class="card table-card shadow p-3">

<h4 class="text-success">Stock Received</h4>

<table class="table">

<tr>
<th>Product</th>
<th>Quantity</th>
</tr>

{% for item in stock_in %}

<tr>
<td>{{item['name']}}</td>
<td>{{item['quantity']}}</td>
</tr>

{% endfor %}

</table>

</div>

</div>

<div class="col-md-6">

<div class="card table-card shadow p-3">

<h4 class="text-danger">Stock Sold</h4>

<table class="table">

<tr>
<th>Product</th>
<th>Quantity</th>
</tr>

{% for item in stock_out %}

<tr>
<td>{{item['name']}}</td>
<td>{{item['quantity']}}</td>
</tr>

{% endfor %}

</table>

</div>

</div>

</div>

</div>

</body>

</html>
