<!DOCTYPE html>
<html>
<head>
<title>Stock In</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(135deg,#4facfe,#00f2fe);
min-height:100vh;
}

.header-card{
background: linear-gradient(90deg,#667eea,#764ba2);
color:white;
}

.form-card{
background:white;
border-radius:12px;
}

.btn-stock{
background:linear-gradient(90deg,#43e97b,#38f9d7);
border:none;
color:black;
font-weight:bold;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark shadow">

<div class="container-fluid">

<span class="navbar-brand">CoreInventory</span>

<div>

<a href="/dashboard" class="btn btn-warning me-2">Dashboard</a>

<a href="/products" class="btn btn-info">Products</a>

</div>

</div>

</nav>

<div class="container mt-5">

<div class="card header-card shadow mb-4">

<div class="card-body text-center">

<h2>📦 Receive Inventory Stock</h2>
<p>Add incoming products to your warehouse</p>

</div>

</div>

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card form-card shadow-lg p-4">

<form method="POST" action="/add_stock">

<label class="form-label fw-bold">Select Product</label>

<select class="form-control mb-3" name="product_id">

{% for p in products %}

<option value="{{p['id']}}">
{{p['name']}}
</option>

{% endfor %}

</select>

<label class="form-label fw-bold">Quantity</label>

<input type="number" class="form-control mb-4" name="quantity" placeholder="Enter quantity">

<button class="btn btn-stock w-100">➕ Add Stock</button>

</form>

</div>

</div>

</div>

</div>

</body>
</html>
